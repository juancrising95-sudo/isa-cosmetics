<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfumes</title>
<link rel="stylesheet" href="style.css">

<style>
body{
    background:#f7f5f0;
    font-family:Poppins;
    text-align:center;
}

.header{
    padding:30px 20px;
    font-size:28px;
    font-weight:600;
    color:#1f5c4c;
}

.marcas{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
    padding:20px;
    max-width:700px;
    margin:auto;
}

.marca{
    background:white;
    padding:30px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    font-size:18px;
    text-decoration:none;
    color:#1f5c4c;
    font-weight:600;
}
</style>

</head>
<body>

<div class="header">PERFUMES</div>

<div class="marcas">
<a href="#" class="marca">Maybelline</a>
<a href="#" class="marca">L'Oréal</a>
<a href="#" class="marca">NYX</a>
<a href="#" class="marca">Revlon</a>
</div>

</body>
</html>
